<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080c1a"/>
      <stop offset="100%" stop-color="#0d1530"/>
    </linearGradient>
    <linearGradient id="grd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="grd2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded-square background -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="86" fill="none"
        stroke="url(#grd)" stroke-width="2" opacity="0.35"/>

  <!-- Background star field -->
  <g fill="#38bdf8">
    <circle cx="68"  cy="68"  r="2.2" opacity="0.55"/>
    <circle cx="444" cy="82"  r="1.6" opacity="0.45"/>
    <circle cx="462" cy="388" r="2.2" opacity="0.50"/>
    <circle cx="50"  cy="432" r="1.6" opacity="0.40"/>
    <circle cx="175" cy="48"  r="1.2" opacity="0.40"/>
    <circle cx="385" cy="465" r="1.2" opacity="0.35"/>
    <circle cx="82"  cy="318" r="1.2" opacity="0.30"/>
    <circle cx="462" cy="220" r="1.2" opacity="0.30"/>
  </g>
  <g fill="#818cf8">
    <circle cx="124" cy="405" r="1.6" opacity="0.40"/>
    <circle cx="425" cy="148" r="1.6" opacity="0.40"/>
    <circle cx="78"  cy="195" r="1.0" opacity="0.30"/>
    <circle cx="465" cy="310" r="1.0" opacity="0.30"/>
  </g>

  <!-- Hexagon outline (flat-top, r=198) -->
  <!-- vertices: 0°(454,256) 60°(355,428) 120°(157,428) 180°(58,256) 240°(157,84) 300°(355,84) -->
  <polygon
    points="454,256 355,428 157,428 58,256 157,84 355,84"
    fill="none"
    stroke="url(#grd)"
    stroke-width="5.5"
    filter="url(#glow)"
  />

  <!-- Second inner hex (faint grid feel) -->
  <polygon
    points="422,256 338,404 170,404 88,256 170,108 338,108"
    fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.12"
  />

  <!-- ═══ BOOK / LEDGER ═══ -->

  <!-- Spine -->
  <rect x="248" y="202" width="16" height="158" rx="7"
        fill="url(#grd)" filter="url(#softglow)"/>

  <!-- Left page body -->
  <rect x="138" y="206" width="108" height="150" rx="10"
        fill="#080c1a" fill-opacity="0.9"
        stroke="url(#grd2)" stroke-width="2.5"/>

  <!-- Left page ruled lines -->
  <line x1="158" y1="244" x2="232" y2="244" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="264" x2="232" y2="264" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="284" x2="232" y2="284" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="304" x2="232" y2="304" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="158" y1="324" x2="232" y2="324" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>

  <!-- Left page value dots (UEC credits) -->
  <circle cx="226" cy="244" r="4.5" fill="#22d3ee" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="216" cy="284" r="4.5" fill="#7c3aed" opacity="0.85" filter="url(#softglow)"/>
  <circle cx="228" cy="324" r="4.5" fill="#3b82f6" opacity="0.85" filter="url(#softglow)"/>

  <!-- Right page body -->
  <rect x="266" y="206" width="108" height="150" rx="10"
        fill="#080c1a" fill-opacity="0.9"
        stroke="url(#grd2)" stroke-width="2.5"/>

  <!-- Right page bar chart (profit curve) -->
  <rect x="277" y="302" width="13" height="42" rx="3" fill="#22d3ee"  opacity="0.70"/>
  <rect x="295" y="286" width="13" height="58" rx="3" fill="#3b82f6"  opacity="0.72"/>
  <rect x="313" y="268" width="13" height="76" rx="3" fill="#22d3ee"  opacity="0.80"/>
  <rect x="331" y="276" width="13" height="68" rx="3" fill="#a78bfa"  opacity="0.72"/>
  <rect x="349" y="290" width="13" height="54" rx="3" fill="#3b82f6"  opacity="0.68"/>

  <!-- Trend line over bars -->
  <polyline
    points="283,302 301,285 319,266 337,275 355,290"
    fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.55"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ═══ STAR / UEC SYMBOL ABOVE BOOK ═══ -->

  <!-- 4-pointed star -->
  <path d="M256,128 L265,151 L288,160 L265,169 L256,192 L247,169 L224,160 L247,151 Z"
        fill="url(#grd)" filter="url(#glow)"/>

  <!-- Orbit ellipse -->
  <ellipse cx="256" cy="160" rx="43" ry="15"
           fill="none" stroke="#22d3ee" stroke-width="1.8"
           stroke-dasharray="5 3.5" opacity="0.48"
           transform="rotate(-18, 256, 160)"/>

  <!-- Connector lines: star to book corners -->
  <line x1="242" y1="180" x2="200" y2="207" stroke="#22d3ee" stroke-width="1.2" opacity="0.28"/>
  <line x1="256" y1="192" x2="256" y2="207" stroke="#22d3ee" stroke-width="1.2" opacity="0.28"/>
  <line x1="270" y1="180" x2="318" y2="207" stroke="#22d3ee" stroke-width="1.2" opacity="0.28"/>

</svg>
